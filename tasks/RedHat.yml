---
- name: RedHat | Install yum-utils for needs-restarting
  ansible.builtin.dnf:
    name: yum-utils
    state: present

- name: RedHat | Install OS Updates
  ansible.builtin.yum:
    name: "*"
    update_cache: true
    state: latest
    exclude: "{{ os_updates_yum_exclude }}"
  # package-latest: Package installs should not use latest
  # we are updating systems, so latest packages is what we want
  tags:
    - skip_ansible_lint
    - molecule-idempotence-notest

- name: RedHat | DIAGNOSTIC | whoami/id
  ansible.builtin.command: "id"
  become: false
  changed_when: false
  register: diag_id
  tags:
    - skip_ansible_lint

- name: RedHat | DIAGNOSTIC | show id result
  ansible.builtin.debug:
    var: diag_id.stdout_lines

- name: RedHat | DIAGNOSTIC | systemctl is-system-running
  ansible.builtin.command: "systemctl is-system-running"
  become: false
  changed_when: false
  ignore_errors: true
  register: diag_systemctl
  tags:
    - skip_ansible_lint

- name: RedHat | DIAGNOSTIC | show systemctl result
  ansible.builtin.debug:
    var: diag_systemctl.stdout_lines

- name: RedHat | DIAGNOSTIC | dbus socket and process
  ansible.builtin.shell: "ls -la /run/dbus/system_bus_socket; pgrep -a dbus-daemon; pgrep -a dbus-broker"
  become: false
  changed_when: false
  ignore_errors: true
  register: diag_dbus
  tags:
    - skip_ansible_lint

- name: RedHat | DIAGNOSTIC | show dbus result
  ansible.builtin.debug:
    var: diag_dbus.stdout_lines

- name: RedHat | DIAGNOSTIC | getenforce
  ansible.builtin.command: "getenforce"
  become: false
  changed_when: false
  ignore_errors: true
  register: diag_selinux
  tags:
    - skip_ansible_lint

- name: RedHat | DIAGNOSTIC | show getenforce result
  ansible.builtin.debug:
    var: diag_selinux.stdout_lines

- name: RedHat | DIAGNOSTIC | raw sudo -n whoami, capture real stderr
  ansible.builtin.shell: "sudo -n whoami; echo RC=$?"
  become: false
  changed_when: false
  ignore_errors: true
  register: diag_sudo
  tags:
    - skip_ansible_lint

- name: RedHat | DIAGNOSTIC | show sudo result
  ansible.builtin.debug:
    var: diag_sudo

- name: RedHat | DIAGNOSTIC | journalctl tail for pam/dbus/sudo
  ansible.builtin.shell: "journalctl -n 100 --no-pager 2>&1 | grep -iE 'pam|dbus|sudo|session' || true"
  become: false
  changed_when: false
  ignore_errors: true
  register: diag_journal
  tags:
    - skip_ansible_lint

- name: RedHat | DIAGNOSTIC | show journalctl result
  ansible.builtin.debug:
    var: diag_journal.stdout_lines

- name: RedHat | Check if a reboot is required
  ansible.builtin.shell: needs-restarting -r
  register: redhat_needs_restart
  ignore_errors: true
  changed_when: false
  tags:
    - skip_ansible_lint
    - molecule-idempotence-notest

- name: RedHat | Reboot machine if needed or forced
  ansible.builtin.reboot:
    post_reboot_delay: "{{ os_updates_reboot_delay | default('0') }}"
    reboot_timeout: "{{ os_updates_reboot_timeout }}"
  when:
    - (redhat_needs_restart.rc == 1 and os_updates_reboot != "NEVER") or os_updates_reboot == "ALWAYS"
  # Docker COntainer cant reboot
  tags:
    - molecule-notest
    - molecule-idempotence-notest

# there is no idempotent way to clean yum cache
# https://github.com/ansible/ansible/pull/31450#issuecomment-352889579
- name: RedHat | Clean yum cache
  ansible.builtin.command: "yum clean all"
  when: os_updates_yum_clean_cache
  tags:
    - molecule-idempotence-notest
    - skip_ansible_lint
